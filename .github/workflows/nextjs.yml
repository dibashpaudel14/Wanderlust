
name: Wanderlust-Continous-Integretion

on:
  push:
    branches:
      - staging

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    environment: staging 

    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/
          file: ./frontend/Dockerfile.new
          push: true
          tags: dibash1414/sonarqube-practice-wanderlust-frontend:v0
          
  Backend-Build:
      runs-on: ubuntu-latest
      environment: staging 
      
      needs: frontend-build
      steps:
        
      - name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          
      -  name: Build and push
         uses: docker/build-push-action@v6
         with:
            context: ./backend/
            push: true
            tags: dibash1414/sonarqube-practice-wanderlust-backend:v0
             
